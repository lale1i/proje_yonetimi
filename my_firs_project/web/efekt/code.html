<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_55 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_55" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_55');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Create Beaded Curtain Effect
const group = new THREE.Group();
const beadCount = 20;
const stringCount = 15;
const spacing = 1.2;
const beadSize = 0.15;

const beadGeometry = new THREE.SphereGeometry(beadSize, 16, 16);
const beadMaterial = new THREE.MeshPhongMaterial({ color: 0xa6192e, shininess: 100 });

for (let i = 0; i < stringCount; i++) {
    for (let j = 0; j < beadCount; j++) {
        const bead = new THREE.Mesh(beadGeometry, beadMaterial);
        bead.position.x = (i - stringCount / 2) * spacing;
        bead.position.y = (j - beadCount / 2) * spacing;
        bead.userData.initialX = bead.position.x;
        bead.userData.initialY = bead.position.y;
        group.add(bead);
    }
}

scene.add(group);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

camera.position.z = 25;

const mouse = new THREE.Vector2();

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

window.addEventListener('mousemove', onMouseMove);

function animate() {
    requestAnimationFrame(animate);
    
    group.children.forEach(bead => {
        const dx = bead.position.x - (mouse.x * 15);
        const dy = bead.position.y - (mouse.y * 15);
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < 5) {
            bead.position.x += dx * 0.05;
            bead.position.y += dy * 0.05;
        } else {
            bead.position.x += (bead.userData.initialX - bead.position.x) * 0.1;
            bead.position.y += (bead.userData.initialY - bead.position.y) * 0.1;
        }
    });

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_55 -->
</body>
</html>
